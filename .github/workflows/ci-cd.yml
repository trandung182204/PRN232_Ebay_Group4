name: CI/CD Pipeline - eBayClone

# KHI NÀO PIPELINE NÀY CHẠY?
# Tự động chạy mỗi khi có ai đó push code lên nhánh main hoặc develop
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ===== JOB 1: BUILD VÀ KIỂM TRA CODE =====
  build:
    name: Build & Test
    runs-on: ubuntu-latest  # Chạy trên máy ảo Ubuntu miễn phí của GitHub

    steps:
      # Bước 1: Lấy code mới nhất từ repo
      - name: Checkout source code
        uses: actions/checkout@v4

      # Bước 2: Cài đặt .NET SDK 8.0
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Bước 3: Restore NuGet packages cho API
      - name: Restore API dependencies
        run: dotnet restore EBayCloneAPI/EBayCloneAPI.csproj

      # Bước 4: Restore NuGet packages cho Web
      - name: Restore Web dependencies
        run: dotnet restore EbayCloneWeb/EbayCloneWeb.csproj

      # Bước 5: Build API project
      - name: Build API
        run: dotnet build EBayCloneAPI/EBayCloneAPI.csproj --configuration Release --no-restore

      # Bước 6: Build Web project
      - name: Build Web
        run: dotnet build EbayCloneWeb/EbayCloneWeb.csproj --configuration Release --no-restore

  # ===== JOB 2: BUILD DOCKER IMAGES =====
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build  # Chỉ chạy khi Job "build" ở trên THÀNH CÔNG

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Build tất cả các Docker images bằng docker compose
      - name: Build Docker Compose images
        run: docker compose build

      # Kiểm tra xem các image đã được build thành công chưa
      - name: Verify Docker images
        run: docker images

      # Khởi động tất cả các container
      - name: Start Docker Compose services
        run: docker compose up -d

      # Đợi các container khởi động xong
      - name: Wait for services to start
        run: sleep 15

      # Kiểm tra trạng thái các container
      - name: Check running containers
        run: docker compose ps

      # Kiểm tra logs xem có lỗi gì không
      - name: Show container logs
        if: always()
        run: docker compose logs --tail=20

      # Dọn dẹp sau khi test xong
      - name: Cleanup
        if: always()
        run: docker compose down
